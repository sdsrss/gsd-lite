name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Security audit
        run: npm audit --omit=dev

      - name: Verify version consistency
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          MARKET_VERSION=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")

          echo "Tag: $VERSION | package.json: $PKG_VERSION | plugin.json: $PLUGIN_VERSION | marketplace.json: $MARKET_VERSION"

          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          if [ "$VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::plugin.json version ($PLUGIN_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          if [ "$VERSION" != "$MARKET_VERSION" ]; then
            echo "::error::marketplace.json version ($MARKET_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          echo "All versions consistent: $VERSION"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
