name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Security audit
        # R-16: gate on high+ only (see ci.yml for rationale). Transitive `hono`
        # HTTP/serverless advisories are unreachable in a stdio-only MCP server;
        # `overrides.hono` pins a patched version, so this reports 0 vulnerabilities.
        run: npm audit --omit=dev --audit-level=high

      - name: Verify version consistency
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          MARKET_VERSION=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")

          echo "Tag: $VERSION | package.json: $PKG_VERSION | plugin.json: $PLUGIN_VERSION | marketplace.json: $MARKET_VERSION"

          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          if [ "$VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::plugin.json version ($PLUGIN_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          if [ "$VERSION" != "$MARKET_VERSION" ]; then
            echo "::error::marketplace.json version ($MARKET_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          echo "All versions consistent: $VERSION"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm (skip if version already exists)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view gsd-lite@$VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::notice::gsd-lite@$VERSION already published to npm — skipping"
          else
            npm publish --access public
            echo "Published gsd-lite@$VERSION to npm"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack deterministic tarball + compute SHA-256
        id: pack
        # R-11: npm pack produces the exact bytes published to npm — deterministic,
        # so the SHA-256 computed here is what every auto-update client downloads
        # and verifies. Unlike GitHub's source tarball_url, these bytes are fixed.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TARBALL="gsd-lite-${VERSION}.tgz"
          npm pack
          test -f "$TARBALL" || { echo "::error::expected $TARBALL from npm pack"; exit 1; }
          SHA=$(sha256sum "$TARBALL" | awk '{print $1}')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Packed $TARBALL — sha256=$SHA"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # If a release was already created (e.g., via `gh release create`),
          # this updates it with auto-generated notes appended.
          # If no release exists, it creates one from scratch.
          make_latest: true
          # R-11: attach the deterministic tarball as a release asset and publish
          # its SHA-256 in the body. The auto-update client prefers this asset over
          # the source tarball and enforces `sha256:` before running install.js.
          files: ${{ steps.pack.outputs.tarball }}
          append_body: true
          body: |

            ---
            **Integrity** — SHA-256 of the attached `${{ steps.pack.outputs.tarball }}` (auto-update verifies this before install):

            sha256: ${{ steps.pack.outputs.sha256 }}
